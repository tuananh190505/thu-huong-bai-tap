<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hái Lộc Tri Thức - Bốc Thăm Lì Xì</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Settings Icon -->
        <button class="settings-btn" id="settingsBtn" title="Cấu hình câu hỏi">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>

        <!-- Reset Button -->
        <button class="reset-btn" id="resetBtn" title="Reset game">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>

        <!-- Reset Questions Button -->
        <button class="reset-questions-btn" id="resetQuestionsBtn" title="Reset câu hỏi">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18"></path>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </button>

        <!-- Game View (Main) -->
        <div id="game" class="tab-content active">
            <div class="game-container">
                <!-- Game Title Banner -->
                <div class="game-title">
                    <h1>🌸 HÁI LỘC TRI THỨC 🌸</h1>
                    <p>Bốc phong bao - Trả lời câu hỏi - Nhận lời chúc may mắn!</p>
                </div>

                <!-- Peach Tree Section -->
                <div class="tree-wrapper">
                    <div class="tree-container" id="treeContainer">
                        
                        <!-- Peach Tree Image -->
                        <div class="tree-image-container">
                            <img src="images/peach-tree.png" alt="Cây Đào" class="peach-tree-img" id="peachTreeImg">
                        </div>
                        
                        <!-- Envelope Items -->
                        <div class="envelopes-layer" id="envelopesContainer">
                            <!-- Will be generated by JS -->
                        </div>
                    </div>
                </div>


            </div>
        </div>

        <!-- Stats Button -->
        <button class="stats-btn" id="statsBtn" title="Thống kê">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 20V10"></path>
                <path d="M12 20V4"></path>
                <path d="M6 20v-6"></path>
            </svg>
        </button>

        <!-- Random Lucky Draw Button -->
        <button class="random-btn" id="randomBtn" title="Bốc ngẫu nhiên">
            <span class="random-icon">🎲</span>
        </button>

        <!-- Random Draw Modal -->
        <div class="random-modal" id="randomModal">
            <div class="random-modal-content">
                <h3 class="random-title">🌟 Bốc Lì Xì May Mắn 🌟</h3>
                <div class="shake-container" id="shakeContainer">
                    <div class="shake-box" id="shakeBox">
                        <span class="shake-emoji" id="shakeEmoji">🎲</span>
                    </div>
                </div>
                <div class="random-result" id="randomResult">
                    <p>Bốc được lì xì số:</p>
                    <span class="random-number" id="randomNumber">?</span>
                </div>
                <button class="random-open-btn" id="randomOpenBtn">🧧 Mở Lì Xì</button>
                <button class="random-close-btn" id="randomCloseBtn">Đóng</button>
            </div>
        </div>

        <!-- Stats Popup -->
        <div class="stats-popup" id="statsPopup">
            <div class="stats-popup-header">
                <span>📊 Thống Kê</span>
                <button class="close-stats-btn" id="closeStatsBtn">✕</button>
            </div>
            <div class="stats-popup-content">
                <div class="stat-row">
                    <span class="stat-label">Tổng câu:</span>
                    <span class="stat-value" id="totalQuestions">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Trúng:</span>
                    <span class="stat-value correct" id="correctCount">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Sai:</span>
                    <span class="stat-value incorrect" id="incorrectCount">0</span>
                </div>
            </div>
        </div>

        <!-- Admin Panel (Sidebar) -->
        <div id="admin" class="tab-content">
            <div class="admin-container">
                <div class="admin-header">
                    <h1>⚙️ Cài Đặt</h1>
                    <button class="close-admin-btn" id="closeAdminBtn" title="Đóng">✕</button>
                </div>

                <!-- Image Configuration Section -->
                <div class="admin-section">
                    <h2>🖼️ Cấu Hình Hình Ảnh</h2>
                    
                    <div class="image-config-group">
                        <label>Ảnh Nền:</label>
                        <div class="image-preview-container">
                            <img id="bgPreview" src="images/tet-background.jpg" alt="Ảnh nền" class="image-preview">
                        </div>
                        <div class="image-upload-controls">
                            <input type="file" id="bgUpload" accept="image/*" class="file-input" hidden>
                            <button type="button" class="upload-btn" onclick="document.getElementById('bgUpload').click()">
                                📤 Chọn Ảnh Nền
                            </button>
                            <button type="button" class="reset-image-btn" id="resetBgBtn">
                                🔄 Mặc Định
                            </button>
                        </div>
                    </div>

                    <div class="image-config-group">
                        <label>Ảnh Cây Đào:</label>
                        <div class="image-preview-container">
                            <img id="treePreview" src="images/peach-tree.png" alt="Cây đào" class="image-preview tree-preview">
                        </div>
                        <div class="image-upload-controls">
                            <input type="file" id="treeUpload" accept="image/*" class="file-input" hidden>
                            <button type="button" class="upload-btn" onclick="document.getElementById('treeUpload').click()">
                                📤 Chọn Ảnh Cây Đào
                            </button>
                            <button type="button" class="reset-image-btn" id="resetTreeBtn">
                                🔄 Mặc Định
                            </button>
                        </div>
                    </div>

                    <div class="image-config-group">
                        <label>Ảnh Lì Xì:</label>
                        <div class="image-preview-container">
                            <img id="envelopePreview" src="images/lixi.png" alt="Lì xì" class="image-preview envelope-preview">
                        </div>
                        <div class="image-upload-controls">
                            <input type="file" id="envelopeUpload" accept="image/*" class="file-input" hidden>
                            <button type="button" class="upload-btn" onclick="document.getElementById('envelopeUpload').click()">
                                📤 Chọn Ảnh Lì Xì
                            </button>
                            <button type="button" class="reset-image-btn" id="resetEnvelopeBtn">
                                🔄 Mặc Định
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Question Form -->
                <div class="admin-section">
                    <h2>➕ Thêm Câu Hỏi Mới</h2>
                    
                    <div class="form-group">
                        <label for="questionText">Câu Hỏi:</label>
                        <textarea id="questionText" placeholder="Nhập câu hỏi..." rows="3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="option1">Đáp Án 1:</label>
                            <input type="text" id="option1" placeholder="Nhập đáp án 1">
                        </div>
                        <div class="form-group">
                            <label for="option2">Đáp Án 2:</label>
                            <input type="text" id="option2" placeholder="Nhập đáp án 2">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="option3">Đáp Án 3:</label>
                            <input type="text" id="option3" placeholder="Nhập đáp án 3">
                        </div>
                        <div class="form-group">
                            <label for="option4">Đáp Án 4:</label>
                            <input type="text" id="option4" placeholder="Nhập đáp án 4">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="correctAnswer">Đáp Án Đúng:</label>
                        <select id="correctAnswer">
                            <option value="">-- Chọn đáp án đúng --</option>
                            <option value="1">Đáp Án 1</option>
                            <option value="2">Đáp Án 2</option>
                            <option value="3">Đáp Án 3</option>
                            <option value="4">Đáp Án 4</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="congratsMessage">💌 Lời Chúc Nếu Trúng:</label>
                        <textarea id="congratsMessage" placeholder="Nhập lời chúc khi trả lời đúng..." rows="2"></textarea>
                    </div>

                    <button id="addQuestionBtn" class="btn-primary">➕ Thêm Câu Hỏi</button>
                </div>

                <!-- Questions List -->
                <div class="admin-section">
                    <h2>📋 Danh Sách Câu Hỏi (<span id="questionCount">0</span>)</h2>
                    <div id="questionsList" class="list-container">
                        <!-- Questions will be listed here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Game Quiz -->
    <div id="quizModal" class="modal hidden">
        <div class="modal-content quiz-modal">
            <button class="modal-close">&times;</button>
            
            <div class="quiz-question">
                <h2 id="modalQuestion"></h2>
                <p class="question-number" id="questionNumber"></p>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options will be generated here -->
            </div>

            <div class="quiz-actions">
                <button id="submitAnswerBtn" class="btn-primary" disabled>Nộp Câu Trả Lời</button>
            </div>
        </div>
    </div>

    <!-- Modal for Result -->
    <div id="resultModal" class="modal hidden">
        <div class="modal-content result-modal">
            <div class="result-content" id="resultContent">
                <!-- Result will be shown here -->
            </div>
            <button id="nextQuestionBtn" class="btn-primary">Lấy Phong Bao Tiếp Theo</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/game.js"></script>
    <script src="js/sample-data.js"></script>
    <script src="js/falling-petals.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
